<!-- Error Page -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignBridge — Error</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

  <!-- Navigation bar -->
  <nav class="navbar">
    <a href="landing.html" class="navbar-brand">
      <img src="https://i.postimg.cc/G37BHLsC/Sand-Solutions-Logo.png" alt="Sand Solutions Logo" class="brand-logo">
      SignBridge
    </a>
    <button class="navbar-hamburger" onclick="toggleMenu()">☰</button>
    <ul class="navbar-links" id="navLinks">
      <li><a href="landing.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="help.html">Help</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="container">
      <div class="card card-sm text-center" style="max-width: 450px;">
        <!-- Warning icon -->
        <div style="font-size: 5rem; margin-bottom: 20px;">⚠️</div>
        
        <!-- Error message -->
        <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 12px;">Something Went Wrong</h1>
        <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 32px;">
          An unexpected error occurred. Please try again.
        </p>
        
        <!-- Go back button -->
        <button class="btn btn-primary" onclick="goBack()">← Go Back</button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <ul class="footer-links">
      <li><a href="#">Privacy Policy</a></li>
      <li><span class="separator">|</span></li>
      <li><a href="#">Terms of Service</a></li>
    </ul>
    <p class="footer-copy">
      <img src="https://i.postimg.cc/G37BHLsC/Sand-Solutions-Logo.png" alt="SignBridge Logo" class="footer-logo">&copy; 2025 SignBridge. All rights reserved.
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>

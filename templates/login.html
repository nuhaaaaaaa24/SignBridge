<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignBridge — Log In</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
</head>

<body>

    <!-- Navigation bar -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <img src="https://i.postimg.cc/G37BHLsC/Sand-Solutions-Logo.png" alt="Sand Solutions Logo"
                class="brand-logo">
            SignBridge
        </a>
        <button class="navbar-hamburger" onclick="toggleMenu()">☰</button>
        <ul class="navbar-links" id="navLinks">
            <li><a href="/landing">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/help">Help</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>


    <!-- Main -->
    <main class="main">
        <h1 class="page-title">SignBridge</h1>
        <p class="page-subtitle">Real-Time Sign Language Communication</p>

        <div class="card card-sm">
            <!-- Login Form -->
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="input" type="text" id="username" placeholder="Username">
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="input" type="password" id="password" placeholder="Password">
            </div>
            <!-- Join Room  -->
            <button class="btn btn-primary btn-block" onclick="login()">Log In</button>

            <div class="divider">OR</div>

            <!-- Create New Session -->
            <button class="btn btn-secondary btn-block" onclick="window.location.href='/register-page'">Don't have an
                account? Register here</button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <ul class="footer-links">
            <li><a href="#">Privacy Policy</a></li>
            <li><span class="separator">|</span></li>
            <li><a href="#">Terms of Service</a></li>
        </ul>
        <p class="footer-copy">
            <img src="https://i.postimg.cc/G37BHLsC/Sand-Solutions-Logo.png" alt="Sand Solutions Logo"
                class="footer-logo">&copy; 2025 SignBridge. All rights reserved.
        </p>
    </footer>

    <script src="/static/app.js"></script>
    <script>
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) {
                alert("Please fill all fields");
                return;
            }

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            // Handle the rate limiting response in case of too many login attempts by the same user.
            if (res.status == 429) {
                alert("Too many login attempts. Please wait 1 minute and try again.");
                return;
            }

            const data = await res.json();
            if (data.success) {
                // Redirect to landing page after successful login
                window.location.href = '/landing';
            } else {
                // Show error in console or handle inline if needed
                alert(data.message);
            }
        }
    </script>
</body>

</html>

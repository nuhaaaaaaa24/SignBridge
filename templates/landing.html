<!--Landing Page-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignBridge — Join</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
</head>
<body>

  <!-- Navigation bar -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">
	<img src="https://i.postimg.cc/G37BHLsC/Sand-Solutions-Logo.png" alt="Sand Solutions Logo" class="brand-logo">
      SignBridge
    </a>
    <button class="navbar-hamburger" onclick="toggleMenu()">☰</button>
    <ul class="navbar-links" id="navLinks">
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/help">Help</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>

  <!-- Main -->
  <main class="main">
    <h1 class="page-title">SignBridge</h1>
    <p class="page-subtitle">Real-Time Sign Language Communication</p>

    <div class="card card-sm">
      <!-- User Name Input -->
      <div class="form-group">
        <label class="form-label" for="userName">Your Name</label>
        <input class="input" type="text" id="userName" placeholder="Enter your name">
      </div>

      <!-- Room code -->
      <div class="form-group">
        <label class="form-label" for="roomCode">Room Code</label>
        <input class="input" type="text" id="roomCode" placeholder="Enter room code">
      </div>
      <!-- Join Room  -->
      <button class="btn btn-primary btn-block" onclick="joinRoom()">Join Room</button>

      <div class="divider">OR</div>

      <!-- Create New Session -->
      <button class="btn btn-secondary btn-block" onclick="createSession()">Create New Session</button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <ul class="footer-links">
      <li><a href="#">Privacy Policy</a></li>
      <li><span class="separator">|</span></li>
      <li><a href="#">Terms of Service</a></li>
    </ul>
    <p class="footer-copy">
	<img src="https://i.postimg.cc/G37BHLsC/Sand-Solutions-Logo.png" alt="Sand Solutions Logo" class="footer-logo">&copy; 2025 SignBridge. All rights reserved.</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>

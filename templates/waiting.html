<!-- Waiting Room Page -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignBridge — Waiting Room</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="/landing" class="navbar-brand">
	<img src="https://i.postimg.cc/G37BHLsC/Sand-Solutions-Logo.png" alt="Sand Solutions Logo" class="brand-logo">
      SignBridge
    </a>
    <button class="navbar-hamburger" onclick="toggleMenu()">☰</button>
    <ul class="navbar-links" id="navLinks">
      <li><a href="/landing">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/help">Help</a></li>
      <li><a href="/contact">Contact</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
  </nav>

  <!-- Main -->
  <main class="main">
    <!-- Page Header -->
    <h1 class="page-title">Waiting Room</h1>
    <!-- Room Code-->
    <p class="page-subtitle">Room Code: <strong id="waitRoomCode">ABC-1234</strong></p>

    <div class="card card-md text-center">
      <!-- Camera Preview -->
      <div class="video-placeholder" style="width:100%;aspect-ratio:16/9;margin-bottom:24px;">
        <span style="position:relative;z-index:1;">Camera Preview</span>
      </div>

      <!-- Status Indicator-->
      <span class="status-badge status-badge--waiting">
        <span class="status-dot status-dot--pulse" style="background:#d4a017;"></span>
        Waiting for another participant to join…
      </span>

      <!-- Action buttons -->
      <div class="flex justify-center gap-12 mt-24">
        <button class="btn btn-success" onclick="joinCall()">Join Call</button>
        <button class="btn btn-secondary" onclick="goBack()">Back</button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <ul class="footer-links">
      <li><a href="#">Privacy Policy</a></li>
      <li><span class="separator">|</span></li>
      <li><a href="#">Terms of Service</a></li>
    </ul>
    <p class="footer-copy">
	<img src="https://i.postimg.cc/G37BHLsC/Sand-Solutions-Logo.png" alt="Sand Solutions Logo" class="footer-logo">&copy; 2025 SignBridge. All rights reserved.</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>

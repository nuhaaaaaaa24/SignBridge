<!-- uses the base template for header and footer -->
{% extends "base.html" %}

<!-- actual content of the page starts here -->
{% block content %}

<!-- Main -->
<main class="page-main">
    <section class="hero container">
        <div class="hero-left">
            <h1>Real-Time Sign Language Communication</h1>
            <p class="hero-text">A clearer, more inclusive way to connect through video calls</p>
        
            <div class="hero-actions">
                <!-- directs users to the signup page-->
                 <a href="{{ url_for('auth.login') }}" class="btn btn-secondary btn-lg">Join Session</a>
                 <!-- allows users to join an existing call -->
                  <a href="{{ url_for('auth.register') }}" class="btn btn-primary btn-lg">Get Started</a>
                </div>
                </div>

                <!-- landing page image -->
                 <div class="hero-right">
                    <div class="hero-dashboard">
                        <img src="https://images.unsplash.com/photo-1582213782179-e0d53f98f2ca?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80"  alt="landing page image">
                    </div>
                 </div>
                 </section>
                </main>

{% endblock %}
<!-- anything added below endblock WILL NOT show up in the page -->

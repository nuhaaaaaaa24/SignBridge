<!-- uses the base template for header and footer -->
{% extends "base.html" %}

<!-- actual content of the page starts here -->
{% block content %}

<!-- Main -->
<main class="profile-main centered-page">
    <section class="profile-section container">
        <div class="simple-profile-card">
            <!-- Avatar -->
            <img
                src="{{ user.avatar(128) }}"
                alt="Profile avatar"
                style="width: 92px; height: 92px; margin: 0 auto 18px; border-radius: 50%; box-shadow: 0 14px 30px rgba(232, 141, 103, 0.18);">
            <h1>My Profile</h1>
            <p class="simple-profile-subtitle">Manage your account details</p>
            
            <!-- Mini card with aligned details -->
            <div class="simple-profile-details">
                <div class="simple-detail-row">
                    <span class="detail-label">Username</span>
                    <span class="detail-value">{{ user.username }}</span>
                </div>

                <div class="simple-detail-row">
                    <span class="detail-label">Email</span>
                    <span class="detail-value">{{ user.email }}</span>
                </div>

                <div class="simple-detail-row">
                    <span class="detail-label">Password</span>
                    <span class="detail-value">********</span>
                </div>

                {% if user.last_seen %}
                <div class="simple-detail-row">
                    <span class="detail-label">Last seen</span>
                    <span class="detail-value">{{ moment(user.last_seen).format('LLL') }}</span>
                </div>
                {% endif %}
            </div>

        <!-- Edit profile button -->
        <div class="simple-profile-actions" style="display: grid; gap: 12px;">
                <a href="{{ url_for('user.edit_profile') }}" class="btn btn-primary btn-full">
                    Edit Profile
                </a>
                
                <!-- Logout -->
                 <a href="{{ url_for('auth.logout') }}" class="btn btn-secondary btn-full">Logout</a>
                </div>

                <!-- create a delete account option here -->
            </div>
        </section>
    </main>


{% endblock %}
<!-- anything added below endblock WILL NOT show up in the page -->

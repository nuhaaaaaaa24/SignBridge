<!-- uses the base template for header and footer -->
{% extends "base.html" %}

<!-- actual content of the page starts here -->
{% block content %}

<main class="error-main centered-page">
    <section class="error-section container">
        <div class="error-card">
            <span class="error-label">Page Not Found</span>

            <div class="error-illustration">
                <img src="https://i.postimg.cc/MGFDs9SF/error.png" alt="Error robot illustration">
            </div>

            <h1 class="error-code-number">404</h1>

            <p class="error-text">
                We couldn't find the page you're looking for.
            </p>

            <div class="error-actions">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary">Go Home</a>
                <a href="{{ url_for('help.help_index') }}" class="btn btn-secondary">Get Help</a>
            </div>
        </div>
    </section>
</main>

{% endblock %}
<!-- anything added below endblock WILL NOT show up in the page -->

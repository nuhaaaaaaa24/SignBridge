<!-- Navigation Bar -->
 <header class="site-header">
    <nav class="navbar">
        <a href="{{ url_for('main.index') }}" class="logo">
            <img src="https://i.postimg.cc/G37BHLsC/Sand-Solutions-Logo.png" alt="Sand Solutions Logo">
            <span class="brand">SignBridge</span>
        </a>

        <div class="nav-links" id="navLinks">
            <a href="{{ url_for('main.index') }}" class="{% if active_nav == 'home' %}active{% endif %}">Home</a>
            <a href="{{ url_for('main.about') }}" class="{% if active_nav == 'about' %}active{% endif %}">About</a>
            <a href="{{ url_for('help.help_index') }}" class="{% if active_nav == 'help' %}active{% endif %}">Help</a>
            <a href="{{ url_for('main.contact') }}" class="{% if active_nav == 'contact' %}active{% endif %}">Contact</a>
        </div>

        <div class="nav-actions">
            {% if current_user.is_authenticated %}
                <div class="user-menu">
                    <button id="userMenuBtn" class="user-menu-trigger" type="button">
                        <img src="{{ current_user.avatar(40) }}" alt="User avatar" class="user-menu-avatar">
                        <span>{{ current_user.username }}</span>
                        <span class="user-menu-chevron">▾</span>
                    </button>

                    <div id="userMenuDropdown" class="user-menu-dropdown">
                        <a href="{{ url_for('user.dashboard') }}">Dashboard</a>

                        <a href="{{ url_for('user.profile') }}">Profile</a>

                        {% if current_user.is_admin %}
                            <a href="{{ url_for('admin.dashboard') }}">Admin</a>
                        {% endif %}

                        <a href="{{ url_for('auth.logout') }}">Logout</a>
                    </div>
                </div>
            {% else %}
                <a href="{{ url_for('auth.login') }}" class="btn btn-primary">Login</a>
            {% endif %}
        </div>

        <button class="navbar-hamburger" type="button" aria-label="Toggle navigation" onclick="toggleMenu()">
            ☰
        </button>
    </nav>
</header>

This page embeds the SignBridge tutorial video and provides a fallback message
if the video cannot be loaded.
-->

<!-- uses the base template for header and footer -->
{% extends "base.html" %}

<!-- actual content of the page starts here -->
{% block content %}

<!-- Main -->
<main class="video-main">
    <section class="video-section container">
    <!-- Page header -->
     <div class="section-intro">
            <p class="section-title">Video Tutorial</p>
            <p class="section-lead">
                Step-by-step guide to using SignBridge
            </p>
        </div>

    <!-- Video container with embedded video -->
     <div class="video-card">
            <div class="video-wrapper">
                <iframe
                    width="560" height="315" 
                    src="https://www.youtube.com/embed/8AbTI3yuAtc?si=DrJKpusZHdaaL6ac" 
                    title="YouTube video player" frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
                ></iframe>
            </div>
        </div>

          <!-- Error placeholder (hidden by default) -->
          <div id="videoPlaceholder" class="video-placeholder">
            <span class="video-error-icon">⚠️</span>
            <p class="video-error-title">Video failed to load</p>
            <p class="video-error-text">
              Please check your connection or try again later.
            </p>
          </div>

      <!-- Back Button -->
      <div class="back-row">
            <a href="{{ url_for('help.help_index') }}" class="back-link">← Back to Help</a>
        </div>
        </section>
      </main>

      <!--==========================Javascript==============================-->
<script>
   // Hides placeholder when video loads
  const video = document.getElementById("demoVideo");
  const placeholder = document.getElementById("videoPlaceholder");

  let loaded = false;

  if (video && placeholder) {
    video.addEventListener("load", function () {
      loaded = true;
      placeholder.style.display = "none";
    });

    setTimeout(function () {
      if (!loaded) {
        placeholder.style.display = "flex";
      }
    }, 5000);
  }
</script>

{% endblock %}
<!-- anything added below endblock WILL NOT show up in the page -->
